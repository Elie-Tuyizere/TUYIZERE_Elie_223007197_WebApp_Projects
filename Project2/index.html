<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration Form</title>

<style>

    body {
        font-family: "Times New Roman", serif;
        font-size: 13px;
    }

    h2 {
        text-align: center;
    }

    .form-group {
        display: flex;
        align-items: center;
        margin-bottom: 5px;
    }

    .form-group label:first-child {
        width: 150px;
        font-weight: bold;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        padding: 2px;
        font-size: 13px;
        height: 20px;
    }

    textarea {
        height: 55px;
    }

    table {
        margin-left: 150px;
        font-size: 13px;
    }

    table input {
        width: 90px;
        height: 18px;
    }

    .inline {
        display: inline-flex;
        align-items: center;
        margin-right: 6px;
    }

    .inline input {
        margin-left: 3px;
    }

    .buttons {
        margin-left: 150px;
    }
</style>
</head>

<body>

<h2>STUDENT REGISTRATION FORM</h2>

<form action="submit.php" method="POST">

<!-- NAME -->
<div class="form-group">
    <label>FIRST NAME</label>
    <input type="text" name="first_name" required>
</div>

<div class="form-group">
    <label>LAST NAME</label>
    <input type="text" name="last_name" required>
</div>

<!-- DOB -->
<div class="form-group">
    <label>DATE OF BIRTH</label>

    <select name="day" required>
        <option value="">Day</option>
        <script>
            for (let i = 1; i <= 31; i++) {
                document.write(`<option value="${i}">${i}</option>`);
            }
        </script>
    </select>

    <select name="month" required>
        <option value="">Month</option>
        <option>January</option><option>February</option>
        <option>March</option><option>April</option>
        <option>May</option><option>June</option>
        <option>July</option><option>August</option>
        <option>September</option><option>October</option>
        <option>November</option><option>December</option>
    </select>

    <select name="year" required>
        <option value="">Year</option>
        <script>
            for (let y = 1990; y <= 2026; y++) {
                document.write(`<option value="${y}">${y}</option>`);
            }
        </script>
    </select>
</div>

<!-- EMAIL -->
<div class="form-group">
    <label>EMAIL ID</label>
    <input type="email" name="email" required>
</div>

<!-- MOBILE -->
<div class="form-group">
    <label>MOBILE NUMBER</label>
    <input type="text" name="mobile" maxlength="10" pattern="[0-9]{10}" required>
</div>

<!-- GENDER -->
<div class="form-group">
    <label>GENDER</label>
    <label class="inline">Male <input type="radio" name="gender" value="Male"></label>
    <label class="inline">Female <input type="radio" name="gender" value="Female"></label>
</div>

<!-- ADDRESS -->
<div class="form-group">
    <label>ADDRESS</label>
    <textarea name="address"></textarea>
</div>

<div class="form-group">
    <label>CITY</label>
    <input type="text" name="city">
</div>

<div class="form-group">
    <label>PIN CODE</label>
    <input type="text" name="pin">
</div>

<div class="form-group">
    <label>STATE</label>
    <input type="text" name="state">
</div>

<div class="form-group">
    <label>COUNTRY</label>
    <select name="country">
        <option>India</option>
        <option>Rwanda</option>
        <option>Kenya</option>
        <option>Uganda</option>
        <option>Tanzania</option>
        <option>USA</option>
        <option>UK</option>
        <option>Canada</option>
    </select>
</div>

<br>

<!-- QUALIFICATION -->
<label>QUALIFICATION</label>

<table border="0">
<tr>
    <th>Sl.No.</th>
    <th>Exam</th>
    <th>Board</th>
    <th>Percentage</th>
    <th>Year</th>
</tr>

<tr>
    <td>1</td>
    <td>Class X</td>
    <td><input type="text" name="board10"></td>
    <td><input type="number" name="per10"></td>
    <td><input type="number" name="year10"></td>
</tr>

<tr>
    <td>2</td>
    <td>Class XII</td>
    <td><input type="text" name="board12"></td>
    <td><input type="number" name="per12"></td>
    <td><input type="number" name="year12"></td>
</tr>

<tr>
    <td>3</td>
    <td>Graduation</td>
    <td><input type="text" name="boardGrad"></td>
    <td><input type="number" name="perGrad"></td>
    <td><input type="number" name="yearGrad"></td>
</tr>

<tr>
    <td>4</td>
    <td>Masters</td>
    <td><input type="text" name="boardM"></td>
    <td><input type="number" name="perM"></td>
    <td><input type="number" name="yearM"></td>
</tr>
</table>

<br>

<!-- COURSE -->
<div class="form-group">
    <label>COURSE</label>
    <label class="inline">BCA <input type="radio" name="course" value="BCA"></label>
    <label class="inline">B.Com <input type="radio" name="course" value="BCom"></label>
    <label class="inline">B.Sc <input type="radio" name="course" value="BSc"></label>
    <label class="inline">B.A <input type="radio" name="course" value="BA"></label>
</div>

<div class="buttons">
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
</div>

</form>

</body>
</html>
